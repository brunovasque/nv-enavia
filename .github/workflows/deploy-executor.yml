name: Deploy enavia-executor

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Ambiente de deploy: test ou prod"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - prod

jobs:
  deploy-executor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"    || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID"   || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve KV namespace IDs from Cloudflare titles
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cleanup() {
            rm -f /tmp/kv_namespaces.json /tmp/wrangler_kv_list.err
          }
          trap cleanup EXIT

          set +e
          npx wrangler kv namespace list > /tmp/kv_namespaces.json 2> /tmp/wrangler_kv_list.err
          WRANGLER_STATUS=$?
          set -e

          if [ "$WRANGLER_STATUS" -ne 0 ]; then
            echo "ERRO: wrangler kv namespace list falhou."
            echo "stderr:"
            cat /tmp/wrangler_kv_list.err
            exit 1
          fi

          if ! jq -e 'type == "array"' /tmp/kv_namespaces.json > /dev/null 2>&1; then
            echo "ERRO: wrangler kv namespace list não retornou JSON array válido."
            echo "stderr:"
            cat /tmp/wrangler_kv_list.err
            exit 1
          fi

          # Diagnóstico seguro: listar somente os títulos/nomes dos KV namespaces
          # visíveis para o token/conta do GitHub Actions. NUNCA imprimir IDs.
          echo "KV namespaces visíveis nesta conta/token:"
          jq -r '.[] | (.title // .name // empty)' /tmp/kv_namespaces.json \
            | sort -u \
            | sed 's/^/- /'
          echo ""

          get_kv_id_by_title() {
            local title="$1"
            local id
            id=$(jq -r --arg title "$title" '.[] | select(.title == $title) | .id' /tmp/kv_namespaces.json | head -n 1)

            if [ -z "$id" ] || [ "$id" = "null" ]; then
              echo "ERRO: KV namespace obrigatório não encontrado: $title" >&2
              echo "Verifique em Cloudflare Workers & Pages > KV se o namespace existe com esse title exato (case-sensitive)." >&2
              exit 1
            fi

            printf "%s" "$id"
          }

          validate_kv_id() {
            local title="$1"
            local value="$2"
            if ! echo "$value" | grep -qE '^[a-f0-9A-F]{16,64}$'; then
              echo "ERRO: KV namespace obrigatório tem ID em formato inválido: $title"
              exit 1
            fi
            echo "KV namespace resolvido por title: $title"
          }

          # Titles abaixo devem bater exatamente com os titles dos KV namespaces na Cloudflare (case-sensitive).
          # Verificar em Workers & Pages > KV se algum title obrigatório não for encontrado.
          ENAVIA_BRAIN_KV_ID=$(get_kv_id_by_title "enavia-brain")
          ENAVIA_BRAIN_TEST_KV_ID=$(get_kv_id_by_title "enavia-brain-test")
          ENAVIA_GIT_KV_ID=$(get_kv_id_by_title "ENAVIA_GIT")
          ENAVIA_GIT_TEST_KV_ID=$(get_kv_id_by_title "ENAVIA_GIT_TEST")
          # Compatibilidade com o código existente do executor: GIT_KV segue como binding lógico
          # separado, apontando para os namespaces físicos ENAVIA_GIT/ENAVIA_GIT_TEST.
          GIT_KV_ID="$ENAVIA_GIT_KV_ID"
          GIT_KV_TEST_ID="$ENAVIA_GIT_TEST_KV_ID"

          validate_kv_id "enavia-brain" "$ENAVIA_BRAIN_KV_ID"
          validate_kv_id "enavia-brain-test" "$ENAVIA_BRAIN_TEST_KV_ID"
          validate_kv_id "ENAVIA_GIT" "$ENAVIA_GIT_KV_ID"
          validate_kv_id "ENAVIA_GIT_TEST" "$ENAVIA_GIT_TEST_KV_ID"

          sed \
            -e "s/REPLACE_WITH_REAL_ENAVIA_BRAIN_ID/${ENAVIA_BRAIN_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_ENAVIA_BRAIN_TEST_ID/${ENAVIA_BRAIN_TEST_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_ENAVIA_GIT_ID/${ENAVIA_GIT_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_ENAVIA_GIT_TEST_ID/${ENAVIA_GIT_TEST_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_GIT_KV_ID/${GIT_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_GIT_KV_TEST_ID/${GIT_KV_TEST_ID}/g" \
            wrangler.executor.template.toml > wrangler.executor.generated.toml
          echo "wrangler.executor.generated.toml gerado com KV IDs resolvidos por title."

      - name: Validate generated config (no placeholders remaining)
        run: |
          if grep -v '^[[:space:]]*#' wrangler.executor.generated.toml | grep -q "REPLACE_WITH_REAL_"; then
            echo "Placeholders não substituídos no generated config. Verifique os KV namespaces obrigatórios."
            exit 1
          fi
          echo "Config gerado sem placeholders — OK."

      - name: Install executor dependencies (acorn)
        run: npm install --prefix executor

      - name: Validate executor syntax
        run: node --check executor/src/index.js

      - name: Run executor contract tests
        run: |
          node executor/tests/executor.contract.test.js
          node --test executor/tests/cloudflare-credentials.test.js

      - name: Deploy Executor TEST
        if: ${{ github.event.inputs.target_env == 'test' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.executor.generated.toml --env test

      - name: Smoke TEST — POST /audit live read
        if: ${{ github.event.inputs.target_env == 'test' }}
        run: |
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"executor_action":"audit","workerId":"nv-enavia","target":{"system":"cloudflare_worker","workerId":"nv-enavia"},"constraints":{"read_only":true,"no_auto_apply":true},"context":{"execution_id":"smoke-test","require_live_read":true}}' \
            https://enavia-executor-test.brunovasque.workers.dev/audit)
          echo "POST /audit → HTTP $HTTP_CODE"
          [ "$HTTP_CODE" -eq 200 ] || { echo "Smoke FAILED: /audit returned $HTTP_CODE"; cat "$RESPONSE_FILE"; exit 1; }
          node - "$RESPONSE_FILE" <<'NODE'
          const fs = require("node:fs");
          const responsePath = process.argv[2];
          const body = JSON.parse(fs.readFileSync(responsePath, "utf8"));
          const text = JSON.stringify(body);
          const proof =
            body?.result?.context_proof ||
            body?.context_proof ||
            body?.result?.context_summary ||
            body?.context_summary ||
            null;

          if (text.includes("CF_ACCOUNT_ID/CF_API_TOKEN ausentes")) {
            console.error("FAILED: credenciais Cloudflare ausentes no smoke live-read.");
            console.error(JSON.stringify(body, null, 2));
            process.exit(1);
          }

          if (!proof?.snapshot_fingerprint) {
            console.error("FAILED: smoke live-read sem prova de snapshot.");
            console.error(JSON.stringify(body, null, 2));
            process.exit(1);
          }

          console.log("snapshot_fingerprint:", proof.snapshot_fingerprint);
          console.log("Smoke PASSED");
          NODE

      - name: Deploy Executor PROD
        if: ${{ github.event.inputs.target_env == 'prod' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.executor.generated.toml
