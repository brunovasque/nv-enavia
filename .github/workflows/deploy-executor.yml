name: Deploy enavia-executor

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Ambiente de deploy: test ou prod"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - prod

jobs:
  deploy-executor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ENAVIA_BRAIN_KV_ID: ${{ secrets.ENAVIA_BRAIN_KV_ID }}
          ENAVIA_BRAIN_TEST_KV_ID: ${{ secrets.ENAVIA_BRAIN_TEST_KV_ID }}
          ENAVIA_GIT_KV_ID: ${{ secrets.ENAVIA_GIT_KV_ID }}
          ENAVIA_GIT_TEST_KV_ID: ${{ secrets.ENAVIA_GIT_TEST_KV_ID }}
          GIT_KV_ID: ${{ secrets.GIT_KV_ID }}
          GIT_KV_TEST_ID: ${{ secrets.GIT_KV_TEST_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"    || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID"   || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$ENAVIA_BRAIN_KV_ID"      || (echo "Missing ENAVIA_BRAIN_KV_ID" && exit 1)
          test -n "$ENAVIA_BRAIN_TEST_KV_ID" || (echo "Missing ENAVIA_BRAIN_TEST_KV_ID" && exit 1)
          test -n "$ENAVIA_GIT_KV_ID"        || (echo "Missing ENAVIA_GIT_KV_ID" && exit 1)
          test -n "$ENAVIA_GIT_TEST_KV_ID"   || (echo "Missing ENAVIA_GIT_TEST_KV_ID" && exit 1)
          test -n "$GIT_KV_ID"               || (echo "Missing GIT_KV_ID" && exit 1)
          test -n "$GIT_KV_TEST_ID"          || (echo "Missing GIT_KV_TEST_ID" && exit 1)

      - name: Generate wrangler config from template + secrets
        env:
          ENAVIA_BRAIN_KV_ID: ${{ secrets.ENAVIA_BRAIN_KV_ID }}
          ENAVIA_BRAIN_TEST_KV_ID: ${{ secrets.ENAVIA_BRAIN_TEST_KV_ID }}
          ENAVIA_GIT_KV_ID: ${{ secrets.ENAVIA_GIT_KV_ID }}
          ENAVIA_GIT_TEST_KV_ID: ${{ secrets.ENAVIA_GIT_TEST_KV_ID }}
          GIT_KV_ID: ${{ secrets.GIT_KV_ID }}
          GIT_KV_TEST_ID: ${{ secrets.GIT_KV_TEST_ID }}
        run: |
          # KV namespace IDs do Cloudflare são strings hex (a-f0-9) de até 32 caracteres.
          # Validar formato antes de injetar no TOML para evitar quebra de sintaxe.
          validate_kv_id() {
            local name="$1"
            local value="$2"
            if ! echo "$value" | grep -qE '^[a-f0-9A-F]{16,64}$'; then
              echo "Formato inválido para $name: esperado hex [a-fA-F0-9], 16-64 caracteres."
              exit 1
            fi
          }
          validate_kv_id "ENAVIA_BRAIN_KV_ID"      "$ENAVIA_BRAIN_KV_ID"
          validate_kv_id "ENAVIA_BRAIN_TEST_KV_ID" "$ENAVIA_BRAIN_TEST_KV_ID"
          validate_kv_id "ENAVIA_GIT_KV_ID"        "$ENAVIA_GIT_KV_ID"
          validate_kv_id "ENAVIA_GIT_TEST_KV_ID"   "$ENAVIA_GIT_TEST_KV_ID"
          validate_kv_id "GIT_KV_ID"               "$GIT_KV_ID"
          validate_kv_id "GIT_KV_TEST_ID"          "$GIT_KV_TEST_ID"
          sed \
            -e "s/REPLACE_WITH_REAL_ENAVIA_BRAIN_ID/${ENAVIA_BRAIN_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_ENAVIA_BRAIN_TEST_ID/${ENAVIA_BRAIN_TEST_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_ENAVIA_GIT_ID/${ENAVIA_GIT_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_ENAVIA_GIT_TEST_ID/${ENAVIA_GIT_TEST_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_GIT_KV_ID/${GIT_KV_ID}/g" \
            -e "s/REPLACE_WITH_REAL_GIT_KV_TEST_ID/${GIT_KV_TEST_ID}/g" \
            wrangler.executor.template.toml > wrangler.executor.generated.toml
          echo "wrangler.executor.generated.toml gerado."

      - name: Validate generated config (no placeholders remaining)
        run: |
          if grep -q "REPLACE_WITH_REAL_" wrangler.executor.generated.toml; then
            echo "Placeholders não substituídos no generated config. Verifique os secrets."
            exit 1
          fi
          echo "Config gerado sem placeholders — OK."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install executor dependencies (acorn)
        run: npm install --prefix executor

      - name: Validate executor syntax
        run: node --check executor/src/index.js

      - name: Run executor contract tests
        run: node executor/tests/executor.contract.test.js

      - name: Deploy Executor TEST
        if: ${{ github.event.inputs.target_env == 'test' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.executor.generated.toml --env test

      - name: Smoke TEST — POST /audit (verdict check)
        if: ${{ github.event.inputs.target_env == 'test' }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"executor_action":"audit","workerId":"nv-enavia","constraints":{"read_only":true,"no_auto_apply":true},"context":{"execution_id":"smoke-test"}}' \
            https://enavia-executor-test.brunovasque.workers.dev/audit)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "POST /audit → HTTP $HTTP_CODE"
          echo "Body: $BODY"
          [ "$HTTP_CODE" -eq 200 ] || { echo "Smoke FAILED: /audit returned $HTTP_CODE"; exit 1; }
          echo "$BODY" | node -e "
            const chunks = [];
            process.stdin.on('data', c => chunks.push(c));
            process.stdin.on('end', () => {
              const body = JSON.parse(chunks.join(''));
              const resultVerdict = body?.result?.verdict;
              const auditVerdict = body?.audit?.verdict;
              if (!resultVerdict) { console.error('FAILED: result.verdict ausente'); process.exit(1); }
              if (!auditVerdict) { console.error('FAILED: audit.verdict ausente'); process.exit(1); }
              console.log('result.verdict:', resultVerdict);
              console.log('audit.verdict:', auditVerdict);
              console.log('Smoke PASSED');
            });
          "

      - name: Deploy Executor PROD
        if: ${{ github.event.inputs.target_env == 'prod' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.executor.generated.toml
