name: Deploy nv-enavia

on:
  push:
    branches:
      - main
    paths:
      - "nv-enavia.js"
      - "wrangler.toml"
      - "schema/**"
      - "contract-executor.js"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Ambiente de deploy"
        required: true
        default: "test"
      confirm_reason:
        description: "Motivo do deploy manual"
        required: true
        default: "bootstrap governance"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate wrangler placeholders
        run: |
          if grep -R "REPLACE_WITH_" wrangler.toml; then
            echo "wrangler.toml ainda contém placeholders. Preencha os bindings/ids reais antes do deploy."
            exit 1
          fi

      - name: Validate required GitHub secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate INTERNAL_TOKEN (TEST only)
        if: ${{ github.event.inputs.target_env == 'test' }}
        env:
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: |
          test -n "$INTERNAL_TOKEN" || (echo "Missing INTERNAL_TOKEN secret — configure-o no GitHub antes de rodar o smoke de TEST." && exit 1)

      - name: Deploy TEST with Wrangler
        if: ${{ github.event.inputs.target_env == 'test' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env test

      - name: Smoke TEST — GET /audit
        if: ${{ github.event.inputs.target_env == 'test' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://enavia-worker-teste.brunovasque.workers.dev/audit)
          echo "GET /audit → HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || { echo "Smoke FAILED: /audit returned $STATUS"; exit 1; }

      - name: Smoke TEST — GET /__internal__/build (auth)
        if: ${{ github.event.inputs.target_env == 'test' }}
        env:
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $INTERNAL_TOKEN" \
            https://enavia-worker-teste.brunovasque.workers.dev/__internal__/build)
          echo "GET /__internal__/build → HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || { echo "Smoke FAILED: /__internal__/build returned $STATUS"; exit 1; }

      - name: Deploy PROD with Wrangler
        if: ${{ github.event_name == 'push' || github.event.inputs.target_env == 'prod' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Smoke PROD — OPTIONS /planner/run (CORS x-session-id)
        if: ${{ github.event_name == 'push' || github.event.inputs.target_env == 'prod' }}
        run: |
          HEADERS=$(curl -s -o /dev/null -D - -X OPTIONS \
            "https://nv-enavia.brunovasque.workers.dev/planner/run" \
            -H "Origin: https://nv-enavia-panel.vercel.app" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: x-session-id, content-type")
          echo "$HEADERS"
          echo "$HEADERS" | grep -i "access-control-allow-headers" | grep -i "x-session-id" \
            || { echo "Smoke FAILED: x-session-id not in Access-Control-Allow-Headers for /planner/run"; exit 1; }
          echo "✅ /planner/run CORS OK"

      - name: Smoke PROD — OPTIONS /memory (CORS x-session-id)
        if: ${{ github.event_name == 'push' || github.event.inputs.target_env == 'prod' }}
        run: |
          HEADERS=$(curl -s -o /dev/null -D - -X OPTIONS \
            "https://nv-enavia.brunovasque.workers.dev/memory" \
            -H "Origin: https://nv-enavia-panel.vercel.app" \
            -H "Access-Control-Request-Method: GET" \
            -H "Access-Control-Request-Headers: x-session-id")
          echo "$HEADERS"
          echo "$HEADERS" | grep -i "access-control-allow-headers" | grep -i "x-session-id" \
            || { echo "Smoke FAILED: x-session-id not in Access-Control-Allow-Headers for /memory"; exit 1; }
          echo "✅ /memory CORS OK"

      - name: Smoke PROD — OPTIONS /execution (CORS x-session-id)
        if: ${{ github.event_name == 'push' || github.event.inputs.target_env == 'prod' }}
        run: |
          HEADERS=$(curl -s -o /dev/null -D - -X OPTIONS \
            "https://nv-enavia.brunovasque.workers.dev/execution" \
            -H "Origin: https://nv-enavia-panel.vercel.app" \
            -H "Access-Control-Request-Method: GET" \
            -H "Access-Control-Request-Headers: x-session-id")
          echo "$HEADERS"
          echo "$HEADERS" | grep -i "access-control-allow-headers" | grep -i "x-session-id" \
            || { echo "Smoke FAILED: x-session-id not in Access-Control-Allow-Headers for /execution"; exit 1; }
          echo "✅ /execution CORS OK"
