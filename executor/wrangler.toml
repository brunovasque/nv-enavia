# executor/wrangler.toml
#
# Espelho governado do wrangler.toml do enavia-executor.
# Fonte original: https://github.com/brunovasque/enavia-executor/blob/main/wrangler.toml
#
# IMPORTANTE: Este arquivo é usado apenas como referência de configuração
# para rastreabilidade dentro do repo nv-enavia.
# O deploy real do executor continua sendo feito a partir do repo externo
# brunovasque/enavia-executor, com o CI/CD e secrets próprios daquele repo.
# Não faça deploy a partir desta pasta sem coordenar com o repo externo.

name = "enavia-executor"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "ENAVIA_BRAIN"
id = "REPLACE_WITH_REAL_ID"

[[kv_namespaces]]
binding = "ENAVIA_GIT"
id = "REPLACE_WITH_REAL_ID"

[[kv_namespaces]]
binding = "GIT_KV"
id = "REPLACE_WITH_REAL_ID"

[vars]
CF_ACCOUNT_ID = "REPLACE_WITH_REAL_VALUE"
CF_WORKER_NAME_NV_ENAVIA = "nv-enavia"
DEPLOY_WORKER_URL = "https://deploy-worker.brunovasque.workers.dev"
ENAVIA_ENV = "production"
OPENAI_CODE_MODEL = "gpt-5.2"
TARGET_WORKER_NAME = "nv-enavia"
