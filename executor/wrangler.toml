# executor/wrangler.toml
#
# Referência de configuração do enavia-executor para rastreabilidade interna.
# Mantida em sincronia com o repo externo brunovasque/enavia-executor.
#
# FONTE DE DEPLOY OPERACIONAL (a partir desta PR):
#   O repo nv-enavia agora é fonte operacional de deploy do Executor via:
#     - wrangler.executor.template.toml  — template com placeholders
#     - .github/workflows/deploy-executor.yml — workflow que gera e deploya
#
# O repo externo brunovasque/enavia-executor pode continuar sendo usado para
# deploy independente, mas a versão canônica do código está em executor/src/index.js
# neste repo (nv-enavia), versionada e governada aqui.
#
# Para deploy a partir deste repo: use o workflow deploy-executor.yml.
# Para deploy a partir do repo externo: coordenar manualmente — o código
# pode divergir se as mudanças não forem sincronizadas entre os dois repos.

name = "enavia-executor"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "ENAVIA_BRAIN"
id = "REPLACE_WITH_REAL_ID"

[[kv_namespaces]]
binding = "ENAVIA_GIT"
id = "REPLACE_WITH_REAL_ID"

[[kv_namespaces]]
binding = "GIT_KV"
id = "REPLACE_WITH_REAL_ID"

# PR107 — service binding de volta ao Worker principal (para /github-bridge/proxy)
# Executor usa ENAVIA_WORKER para repassar operações GitHub ao Worker sem guardar token.
[[services]]
binding = "ENAVIA_WORKER"
service = "nv-enavia"

[vars]
CF_ACCOUNT_ID = "REPLACE_WITH_REAL_VALUE"
CF_WORKER_NAME_NV_ENAVIA = "nv-enavia"
DEPLOY_WORKER_URL = "https://deploy-worker.brunovasque.workers.dev"
ENAVIA_ENV = "production"
OPENAI_CODE_MODEL = "gpt-5.2"
TARGET_WORKER_NAME = "nv-enavia"
