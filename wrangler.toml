name = "nv-enavia"
main = "nv-enavia.js"
compatibility_date = "2026-04-10"
workers_dev = true

[observability.logs]
enabled = true

[vars]
ENAVIA_MODE = "supervised"
BROWSER_EXECUTOR_URL = "https://run.nv-imoveis.com/browser/run"
SUPABASE_URL = "https://jsqvhmnjsbmtfyyukwsr.supabase.co"
SUPABASE_BUCKET = "enavia-brain"
OPENAI_MODEL = "gpt-5.2"
# PR107: ENAVIA_EXECUTOR_URL_FALLBACK — usado SOMENTE quando service binding EXECUTOR ausente.
# Primário: env.EXECUTOR (service binding, ver [[services]]).
ENAVIA_EXECUTOR_URL_FALLBACK = "https://enavia-executor.brunovasque.workers.dev"
# PR107: ENAVIA_DEPLOY_WORKER_URL — fallback HTTP quando service binding DEPLOY_WORKER ausente.
# Primário: env.DEPLOY_WORKER (service binding, ver [[services]]).
ENAVIA_DEPLOY_WORKER_URL = "https://deploy-worker.brunovasque.workers.dev"
DIRECTOR_COGNITIVE_URL = "https://nv-director-cognitive.brunovasque.workers.dev/director/cognitive"
VERCEL_EXECUTOR_URL = "https://nv-vercel-executor.brunovasque.workers.dev/vercel/patch"
ENAVIA_VERSION = "v2"
OWNER = "Vasques"
SYSTEM_NAME = "ENAVIA"

[[kv_namespaces]]
binding = "ENAVIA_BRAIN"
id = "722835b730dd44c79f6ff1f0cdc314a9"
preview_id = "235fd25ad3b44217975f6ce0d77615d0"

# PR105 — GitHub Bridge Real
# GITHUB_TOKEN é um secret Cloudflare (não vai em [vars] — nunca em texto claro).
# Configurar com escopo mínimo (repo: leitura/escrita de PRs e branches):
#   wrangler secret put GITHUB_TOKEN
# O binding expõe env.GITHUB_TOKEN no Worker — nunca logado, nunca retornado em response.
secrets = ["GITHUB_TOKEN"]

[[services]]
binding = "EXECUTOR"
service = "enavia-executor"

[[services]]
binding = "DEPLOY_WORKER"
service = "deploy-worker"

[env.test]
name = "enavia-worker-teste"
workers_dev = true

[env.test.vars]
ENAVIA_MODE = "supervised"
BROWSER_EXECUTOR_URL = ""
SUPABASE_URL = "https://jsqvhmnjsbmtfyyukwsr.supabase.co"
SUPABASE_BUCKET = "enavia-brain-test"
OPENAI_MODEL = "gpt-5.2"
ENAVIA_EXECUTOR_URL_FALLBACK = "https://enavia-executor.brunovasque.workers.dev"
ENAVIA_DEPLOY_WORKER_URL = "https://deploy-worker.brunovasque.workers.dev"
DIRECTOR_COGNITIVE_URL = "https://nv-director-cognitive.brunovasque.workers.dev/director/cognitive"
VERCEL_EXECUTOR_URL = "https://nv-vercel-executor.brunovasque.workers.dev/vercel/patch"
ENAVIA_VERSION = "v2"
OWNER = "Vasques"
SYSTEM_NAME = "ENAVIA"

# NOTE (item 1 - isolamento): TEST usa o mesmo DIRECTOR_COGNITIVE_URL que PROD.
# Isolamento completo requer um endpoint dedicado de TEST (ex: nv-director-cognitive-test).
# Enquanto esse endpoint não existir, o tráfego TEST chega ao director cognitivo de PROD.

[[env.test.kv_namespaces]]
binding = "ENAVIA_BRAIN"
id = "235fd25ad3b44217975f6ce0d77615d0"

[[env.test.services]]
binding = "EXECUTOR"
service = "enavia-executor-test"

[[env.test.services]]
binding = "DEPLOY_WORKER"
service = "deploy-worker-test"
