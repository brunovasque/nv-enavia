name = "nv-enavia"
main = "nv-enavia.js"
compatibility_date = "2026-04-10"
workers_dev = true

[observability.logs]
enabled = true

[vars]
ENAVIA_MODE = "supervised"
BROWSER_EXECUTOR_URL = "https://run.nv-imoveis.com/browser/run"
SUPABASE_URL = "https://jsqvhmnjsbmtfyyukwsr.supabase.co"
SUPABASE_BUCKET = "enavia-brain"
OPENAI_MODEL = "gpt-5.2"
ENAVIA_EXECUTOR_URL = "https://enavia-executor.brunovasque.workers.dev"
ENAVIA_VERSION = "v2"
ENAVIA_PROMPT_ID = "pmpt_692a06216ea48196ac1a7e37cf0f61c30682b799d2183928"
OWNER = "Vasques"
SYSTEM_NAME = "ENAVIA"

[[kv_namespaces]]
binding = "ENAVIA_BRAIN"
id = "722835b730dd44c79f6ff1f0cdc314a9"
preview_id = "235fd25ad3b44217975f6ce0d77615d0"

[[kv_namespaces]]
binding = "ENAVIA_GIT"
id = "c944c6f694f34056bd1eceaed851bb47"
preview_id = "77196944095542b3bb7c80121950bcab"

[[services]]
binding = "EXECUTOR"
service = "enavia-executor"

[[services]]
binding = "DEPLOY_WORKER"
service = "deploy-worker"

