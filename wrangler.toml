OWNER = "Vasques"
SYSTEM_NAME = "ENAVIA"

[[env.test.kv_namespaces]]
binding = "ENAVIA_BRAIN"
id = "235fd25ad3b44217975f6ce0d77615d0"

[[env.test.kv_namespaces]]
